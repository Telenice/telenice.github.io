<!DOCTYPE html>
<html>
<head>
    <title>Coke Calculator</title>
    <link rel="stylesheet" type="text/css" href="index.css">
</head>
<body>
    <h1>Coke Calculator</h1>
    <div class="calculator-container">
        <div class="button-container">
            <button id="rep">Rep</button>
            <button id="pure">Pure</button>
        </div>
    </div>

    <script>
        document.getElementById('rep').addEventListener('click', function() {
            window.location.href = 'rep.html';
        });
        document.getElementById('pure').addEventListener('click', function() {
            window.location.href = 'pure.html';
        });
    </script>
</body>
</html>
