<!DOCTYPE html>
<html>
<head>
    <title>Coke Calculator</title>
    <link rel="stylesheet" type="text/css" href="index.css">
</head>
<body>
    <h1>Coke Calculator</h1>
    <div class="calculator-container">
        <div class="button-container">
            <button id="stage1pure">Stage 1</button>
            <button id="stage2pure">Stage 2</button>
            <button id="stage3pure">Stage 3</button>
            <button id="return">Return</button>
        </div>
    </div>

    <script>
        document.getElementById('stage1pure').addEventListener('click', function() {
            window.location.href = 'stage1pure.html';
        });
        document.getElementById('stage2pure').addEventListener('click', function() {
            window.location.href = 'stage2pure.html';
        });
        document.getElementById('stage3pure').addEventListener('click', function() {
            window.location.href = 'stage3pure.html';
        });
        document.getElementById('return').addEventListener('click', function() {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
