<!DOCTYPE html>
<html>
<head>
    <title>Stage 2 Calculator - 1:1 ratio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        
        h1 {
            text-align: center;
            margin-top: 30px;
            color: #333;
        }

        .calculator-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        .input-container {
            margin-bottom: 20px;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        input[type="number"] {
            width: calc(100% - 16px);
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #51c28b;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #3f9169;
        }

        #output {
            margin-top: 20px;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        #output p {
            margin: 0 0 10px;
            padding: 0;
        }

        #output .total {
            font-weight: bold;
            color: #333;
        }

        .return-button {
            text-align: center;
            margin-top: 20px;
        }

        .return-button button {
            background-color: #51c28b;
            color: #fff;
            border-radius: 4px;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .return-button button:hover {
            background-color: #3f9169;
        }
    </style>
</head>
<body>
    <h1>Stage 2 Calculator - 1:1 ratio</h1>
    <div class="calculator-container">
        <div class="input-container">
            <label for="cocainePaste">Enter the number of cocaine leaf paste:</label>
            <input type="number" id="cocainePaste" name="cocainePaste" min="5" step="5">
        </div>
        <button id="calculator">Calculate</button>
        <div id="output"></div>
        
        <div class="return-button">
            <button id="return">Return</button>
        </div>
    </div>

    <script>
        const items = {
            "Cocaine Leaf Paste": { "ratio": 1, "weight": 0.25, "price": 0 },
            "Cement": { "ratio": 1, "weight": 0.25, "price": 15 },
            "Jerry Can": { "ratio": 1, "weight": 2, "price": 250 },
            "Thionyl Chloride": { "ratio": 2, "weight": 0.6, "price": 10 },
            "Plant Fertiliser": { "ratio": 2, "weight": 1, "price": 10 },
            "Bandages": { "ratio": 2, "weight": 0.005, "price": 10 },
        };

        document.getElementById('calculator').addEventListener('click', calculate);
        document.getElementById('return').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        function calculate() {
            const cocainePaste = document.getElementById('cocainePaste').value;
            let output = '';
            let totalWeight = 0;
            let totalCost = 0;
            for (const [item, data] of Object.entries(items)) {
                const quantity = data.ratio * (cocainePaste * 1);
                const weight = quantity * data.weight;
                const cost = quantity * data.price;
                totalWeight += weight;
                totalCost += cost;
                output += `${item}: ${quantity} items, ${weight.toFixed(2)} kg, £${cost.toFixed(2)}<br>`;
            }
            output += `</p><p class="total">Total weight: ${totalWeight.toFixed(2)} kg<br>`;
            output += `Total cost: £${totalCost.toFixed(2)}</p>`;
            document.getElementById('output').innerHTML = output;
        }
    </script>
</body>
</html>
