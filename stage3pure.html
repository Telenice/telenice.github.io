<!DOCTYPE html>
<html>
<head>
    <title>Stage 3 Calculator - 2:6 ratio</title>
    <link rel="stylesheet" type="text/css" href="calculate.css">
</head>
<body>
    <h1>Stage 3 Calculator - 2:6 ratio</h1>
    <div class="input-container">
        <label for="cocaineExtract">Enter the number of cocaine chemical extract:</label>
        <input type="number" id="cocaineExtract" name="cocaineExtract" min="1" step="1">
    </div>
    <button id="calculator">Calculate</button>
    <div id="output"></div>

    <div class="return-button">
        <button id="return">Return</button>
    </div>

    <script>
        const items = {
            "Cocaine Extract": { "ratio": 1, "weight": 0.375, "price": 0 },
            "Thionyl Chloride": { "ratio": 1, "weight": 0.6, "price": 10 },
            "Bottle of Ammonia": { "ratio": 2, "weight": 0.25, "price": 65 },
            "Cleaning Kit": { "ratio": 6, "weight": 0.25, "price": 10 },
        };

        document.getElementById('calculator').addEventListener('click', function() {
            const cocaineExtract = document.getElementById('cocaineExtract').value;
            if (cocaineExtract < 1) {
                alert("Invalid input. Please enter a number greater than or equal to 1.");
            } else {
                let output = '';
                let totalWeight = 0;
                let totalCost = 0;
                for (const [item, data] of Object.entries(items)) {
                    const quantity = data.ratio * cocaineExtract;
                    const weight = quantity * data.weight;
                    const cost = quantity * data.price;
                    totalWeight += weight;
                    totalCost += cost;
                    output += `${item}: ${quantity} items, ${weight.toFixed(2)} kg, £${cost.toFixed(2)}<br>`;
                }
                output += `<p class="total">Total weight: ${totalWeight.toFixed(2)} kg<br>`;
                output += `Total cost: £${totalCost.toFixed(2)}</p>`;
                document.getElementById('output').innerHTML = output;
            }
        });

        document.getElementById('return').addEventListener('click', function() {
            window.location.href = 'pure.html';
        });
    </script>
</body>
</html>
