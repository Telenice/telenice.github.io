<!DOCTYPE html>
<html>
<head>
    <title>Coke Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-top: 30px;
        }

        .calculator-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #51c28b;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #3f9169;
        }
    </style>
</head>
<body>
    <h1>Coke Calculator</h1>
    <div class="calculator-container">
        <div class="button-container">
            <button id="stage1rep">Stage 1</button>
            <button id="stage2rep">Stage 2</button>
            <button id="stage3rep">Stage 3</button>
        </div>
    </div>

    <script>
        document.getElementById('stage1rep').addEventListener('click', function() {
            window.location.href = 'stage1rep.html';
        });
        document.getElementById('stage2rep').addEventListener('click', function() {
            window.location.href = 'stage2rep.html';
        });
        document.getElementById('stage3rep').addEventListener('click', function() {
            window.location.href = 'stage3rep.html';
        });
    </script>
</body>
</html>
